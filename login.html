<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GCL Letter System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
    135deg,
    #0f172a 0%,
    #1e3a8a 50%,
    #2563eb 100%
    );

    overflow:hidden;
}

body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#fff20020;
    border-radius:50%;
    top:-200px;
    right:-150px;
    filter:blur(80px);
}

body::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:#ffffff15;
    border-radius:50%;
    bottom:-180px;
    left:-100px;
    filter:blur(100px);
}

.login-card{

    width:420px;
    max-width:90%;

    backdrop-filter:blur(15px);
    background:rgba(255,255,255,.12);

    border:1px solid rgba(255,255,255,.2);

    border-radius:25px;

    padding:40px;

    box-shadow:
    0 15px 35px rgba(0,0,0,.35);

    animation:fadeUp .8s ease;
}

.login-card:hover{

    transform:translateY(-5px);

    transition:.3s;

    box-shadow:
    0 20px 40px rgba(0,0,0,.45);
}

.logo{
    width:100%;
    border-radius:10px;
    margin-bottom:20px;
}

.title{
    color:white;
    text-align:center;
    font-size:24px;
    font-weight:700;
}

.subtitle{
    color:#dbeafe;
    text-align:center;
    margin-bottom:25px;
    font-size:13px;
}

.form-group{
    margin-bottom:18px;
}

label{
    color:white;
    display:block;
    margin-bottom:8px;
}

input{

    width:100%;
    padding:14px;

    border:none;

    border-radius:12px;

    outline:none;

    background:white;

    font-size:14px;
}

.login-btn{

    width:100%;
    padding:14px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    font-weight:600;

    background:#fff200;

    color:#0f172a;

    transition:.3s;
}

.login-btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 0 20px rgba(255,242,0,.6);
}

.footer{

    margin-top:20px;

    text-align:center;

    color:#dbeafe;

    font-size:12px;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="login-card">

```
<!-- Ganti dengan logo Gateway -->
<img src="assets/logo.png" class="logo">

<h1 class="title">
    GCL LETTER SYSTEM
</h1>

<p class="subtitle">
    Gateway Container Line - Document Numbering System
</p>

<form id="loginForm">

    <div class="form-group">

        <label>Email Address</label>

        <input
        type="email"
        id="email"
        placeholder="Masukkan email"
        required>

    </div>

    <div class="form-group">

        <label>Password</label>

        <input
        type="password"
        id="password"
        placeholder="Masukkan password"
        required>

    </div>

    <button
    type="submit"
    class="login-btn">

    LOGIN

    </button>

</form>

<div class="footer">
    © Gateway Container Line
</div>
```

</div>

<script>

document.getElementById('loginForm')
.addEventListener('submit',function(e){

    e.preventDefault();

    const email =
    document.getElementById('email').value;

    const password =
    document.getElementById('password').value;

    console.log(email,password);

});

</script>

</body>
</html>
