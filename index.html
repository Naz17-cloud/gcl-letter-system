<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GCL Letter System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#0f172a,#1e3a8a);
overflow:hidden;
}

body::before{
content:'';
position:absolute;
width:450px;
height:450px;
background:#fff20025;
border-radius:50%;
top:-150px;
right:-100px;
filter:blur(100px);
}

body::after{
content:'';
position:absolute;
width:400px;
height:400px;
background:#ffffff15;
border-radius:50%;
bottom:-150px;
left:-100px;
filter:blur(120px);
}

.login-card{

width:430px;

padding:40px;

border-radius:25px;

background:
rgba(255,255,255,.12);

backdrop-filter:blur(12px);

border:
1px solid rgba(255,255,255,.15);

box-shadow:
0 20px 50px rgba(0,0,0,.4);

animation:fadeUp .8s ease;
}

.logo{
width:100%;
margin-bottom:20px;
}

.title{
text-align:center;
color:white;
font-size:28px;
font-weight:700;
}

.subtitle{
text-align:center;
color:#dbeafe;
margin-bottom:25px;
font-size:13px;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
margin-bottom:6px;
color:white;
}

.input-group input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:14px;
outline:none;
}

.btn-login{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#fff200;
color:#1e3a8a;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.btn-login:hover{
transform:translateY(-3px);
box-shadow:
0 0 20px rgba(255,242,0,.6);
}

.footer{
text-align:center;
margin-top:20px;
color:#dbeafe;
font-size:12px;
}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="login-card">

<img src="assets/logo.png" class="logo">

<h1 class="title">
GCL LETTER SYSTEM
</h1>

<p class="subtitle">
Gateway Container Line
</p>

<form id="loginForm">

<div class="input-group">

<label>Email</label>

<input
type="email"
placeholder="Masukkan Email">

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
placeholder="Masukkan Password">

</div>

<button
type="submit"
class="btn-login">

LOGIN

</button>

</form>

<div class="footer">
© Gateway Container Line
</div>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener("submit",(e)=>{

e.preventDefault();

window.location.href=
"dashboard.html";

});

</script>

</body>
</html>
