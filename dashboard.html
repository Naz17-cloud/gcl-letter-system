<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
background:#f1f5f9;
}

.sidebar{

width:260px;
height:100vh;

background:#0f172a;

padding:25px;

position:fixed;

}

.logo{
color:white;
font-size:24px;
font-weight:700;
margin-bottom:30px;
}

.menu a{

display:block;

padding:14px;

margin-bottom:10px;

text-decoration:none;

background:#1e293b;

color:white;

border-radius:12px;

transition:.3s;
}

.menu a:hover{

background:#2563eb;

transform:translateX(5px);

}

.main{

margin-left:260px;

width:100%;

padding:30px;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

}

.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}

.card{

background:white;

padding:25px;

border-radius:18px;

box-shadow:
0 5px 20px rgba(0,0,0,.08);

}

.card h3{

color:#64748b;

font-size:14px;

margin-bottom:10px;

}

.card h2{

font-size:28px;

color:#0f172a;

}

.table-box{

margin-top:30px;

background:white;

padding:20px;

border-radius:18px;

box-shadow:
0 5px 20px rgba(0,0,0,.08);

}

table{

width:100%;

border-collapse:collapse;

}

table th{

background:#0f172a;

color:white;

padding:12px;

}

table td{

padding:12px;

border-bottom:
1px solid #e5e7eb;

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

GCL SYSTEM

</div>

<div class="menu">

<a href="#">
Dashboard
</a>

<a href="request.html">
Request Nomor Surat
</a>

<a href="history.html">
Riwayat Surat
</a>

<a href="#">
Cari Surat
</a>

<a href="#">
Logout
</a>

</div>

</div>

<div class="main">

<div class="header">

<h1>
Dashboard Staff
</h1>

</div>

<div class="cards">

<div class="card">

<h3>Total Surat Saya</h3>

<h2>28</h2>

</div>

<div class="card">

<h3>Surat Bulan Ini</h3>

<h2>11</h2>

</div>

<div class="card">

<h3>Surat Hari Ini</h3>

<h2>2</h2>

</div>

</div>

<div class="table-box">

<h2 style="margin-bottom:15px;">
Riwayat Surat Terakhir
</h2>

<table>

<thead>

<tr>

<th>No Surat</th>

<th>Kode</th>

<th>Perihal</th>

<th>Tanggal</th>

</tr>

</thead>

<tbody>

<tr>

<td>GCL-SUB/SPDO/127/VI/2026</td>

<td>SPDO</td>

<td>Permohonan Delivery Order</td>

<td>02/06/2026</td>

</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
