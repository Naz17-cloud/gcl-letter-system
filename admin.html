<!-- SIDEBAR -->

<aside class="sidebar">

    <div class="sidebar-logo">

        GCL ADMIN

    <nav>

        <a

    </nav>

<!-- MAIN -->

<main class="main">

    <div class="page-header">

        <h1>

            Dashboard Administrator

        </h1>

        <p>

            Gateway Container Line

        </p>

    </div>

    <!-- STATISTICS -->

    <section class="cards">

        <div class="card">

            <div class="stat-title">

                Total Surat

            </div>

            <div
                class="stat-value"
                id="totalLetters">

                0

            </div>

        </div>

        <div class="card">

            <div class="stat-title">

                Surat Tahun Ini

            </div>

            <div
                class="stat-value"
                id="yearLetters">

                0

            </div>

        </div>

        <div class="card">

            <div class="stat-title">

                Surat Hari Ini

            </div>

            <div
                class="stat-value"
                id="todayLetters">

                0

            </div>

        </div>

        <div class="card">

            <div class="stat-title">

                Total Staff Aktif

            </div>

            <div
                class="stat-value"
                id="totalUsers">

                0

            </div>

        </div>

    </section>

    <!-- SURAT TERBARU -->

    <section
        class="table-card"
        style="margin-top:25px;">

        <div class="section-header">

            <h2>

                10 Surat Terbaru

            </h2>

            <a
                href="history.html"
                class="btn btn-primary">

                Lihat Semua

            </a>

        </div>

        <table>

            <thead>

                <tr>

                    <th>
                        Nomor Surat
                    </th>

                    <th>
                        Peminta
                    </th>

                    <th>
                        Kode
                    </th>

                    <th>
                        Tanggal
                    </th>

                    <th>
                        Status
                    </th>

                </tr>

            </thead>

            <tbody
                id="recentLetters">

            </tbody>

        </table>

    </section>

</main>
